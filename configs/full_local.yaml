mode: full_local
seed: 42
device: auto

# Sample limits (null = use all)
max_train_samples: null
max_eval_samples: null
max_kb_chunks: null

# Training epochs
retriever_epochs: 2
reranker_epochs: 1
triage_epochs: 3
preference_epochs: 2
generator_epochs: 0

# Batch sizes
batch_size: 8
reranker_batch_size: 4
triage_batch_size: 8
gradient_accumulation_steps: 4

# Precision
fp16: true

# Retrieval
top_k_retrieval: 20
top_k_rerank: 5
top_k_domains: 2

# Triage loss
mu_boundary: 0.15
lambda_boundary: 0.6

# Domain routing thresholds
tau_domain: 0.30
tau_chunk: 0.40

# Cluster-gated retrieval thresholds
cluster_out_of_domain_threshold: 0.30
cluster_confident_margin: 0.10
cluster_ambiguous_top_k: 2
evidence_answer_threshold: 0.40
evidence_ticket_threshold: 0.10
max_clusters_for_confident_query: 1
max_clusters_for_ambiguous_query: 2

# Model paths (use HF hub IDs)
retriever_model: sentence-transformers/all-MiniLM-L6-v2
reranker_model: cross-encoder/ms-marco-MiniLM-L-6-v2
triage_model: distilbert-base-uncased
# Generator Settings
generator_enabled: true
generator_model_name: google/flan-t5-base
generator_fallback_model_name: google/flan-t5-small
generator_max_input_tokens: 768
generator_max_new_tokens: 1024
generator_num_beams: 5
generator_temperature: 0.1
top_evidence_count: 4

# Model paths (use HF hub IDs)
retriever_model: sentence-transformers/all-MiniLM-L6-v2
reranker_model: cross-encoder/ms-marco-MiniLM-L-6-v2
triage_model: distilbert-base-uncased
generator_model: google/flan-t5-base

# Output directories
output_dir: outputs
data_dir: data/processed
index_dir: data/indexes
