mode: smoke
seed: 42
device: auto

# Sample limits
max_train_samples: 300
max_eval_samples: 20
max_kb_chunks: null

# Training epochs
retriever_epochs: 1
reranker_epochs: 1
triage_epochs: 1
preference_epochs: 1
generator_epochs: 1

# Batch sizes
batch_size: 8
reranker_batch_size: 4
triage_batch_size: 8
gradient_accumulation_steps: 2

# Precision
fp16: true

# Paths
output_dir: outputs
data_dir: data/sample
index_dir: data/smoke_indexes/global
raw_index_dir: data/smoke_indexes/raw
domain_indexes_dir: data/smoke_indexes/domain
eval_file: eval_set.jsonl

# Retrieval
top_k_retrieval: 10
top_k_rerank: 3
top_k_domains: 2

# Triage loss
mu_boundary: 0.15
lambda_boundary: 0.6

# Domain routing thresholds
# Slightly stricter than before to reduce false accepts.
tau_domain: 0.35
tau_chunk: 0.50

# Cluster-gated retrieval thresholds
cluster_out_of_domain_threshold: 0.35
cluster_confident_margin: 0.10
cluster_ambiguous_top_k: 2

# Evidence thresholds
# Raised answer threshold to reduce answering on weak/irrelevant evidence.
evidence_answer_threshold: 0.55
evidence_ticket_threshold: 0.25

max_clusters_for_confident_query: 1
max_clusters_for_ambiguous_query: 2

# Model paths
raw_retriever_model: sentence-transformers/all-MiniLM-L6-v2
retriever_model: sentence-transformers/all-MiniLM-L6-v2
reranker_model: cross-encoder/ms-marco-MiniLM-L-6-v2
triage_model: distilbert-base-uncased

# Flan-T5 large is heavy and can behave poorly in smoke mode.
# Base is more stable for local/Kaggle testing.
generator_model: google/flan-t5-base
generator_fallback_model_name: google/flan-t5-small

# Generation controls
generator_max_new_tokens: 120
generator_num_beams: 4
generator_temperature: 0.0