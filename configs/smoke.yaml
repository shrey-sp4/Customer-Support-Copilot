mode: smoke_sanity_check # Fast verification for CI/CD or environment setup
seed: 42
device: auto

# Sample limits
max_train_samples: 300
max_eval_samples: 20
max_kb_chunks: null

# Training epochs
retriever_epochs: 1
reranker_epochs: 1
triage_epochs: 1
preference_epochs: 1
generator_epochs: 1

# Batch sizes
batch_size: 8
reranker_batch_size: 4
triage_batch_size: 8
gradient_accumulation_steps: 2

# Precision
fp16: true

# Paths
output_dir: outputs
data_dir: data/processed
index_dir: data/indexes
raw_index_dir: data/indexes_raw
domain_indexes_dir: data/indexes_by_domain
eval_file: balanced_eval.jsonl
reports_dir: outputs/reports

# Retrieval
top_k_retrieval: 10
top_k_rerank: 3
top_k_domains: 2
global_domain_filter_multiplier: 10

# Triage loss
mu_boundary: 0.15
lambda_boundary: 0.6

# Routing/Triage Thresholds
tau_domain: 0.35
tau_chunk: 0.50
tau_hard_reject: 0.08
tau_soft_domain: 0.20
cluster_out_of_domain_threshold: 0.35
cluster_confident_margin: 0.10
cluster_ambiguous_top_k: 2
max_clusters_for_confident_query: 1
max_clusters_for_ambiguous_query: 2

# Evidence Logic
evidence_answer_threshold: 0.55
evidence_ticket_threshold: 0.25
high_confidence_evidence_threshold: 0.80
strong_answer_score_threshold: 0.55
borderline_answer_score_threshold: 0.45
min_citation_overlap: 2
wrong_domain_penalty: 0.40
domain_intent_bonus: 0.25
selected_domain_bonus: 0.05
action_match_bonus: 0.20
driver_non_driver_penalty: 0.75
license_id_card_penalty: 0.50

# Triage Decision Thresholds
triage_authoritative_threshold: 0.55
personal_action_ticket_confidence: 0.80
insufficient_evidence_ticket_confidence: 0.70

# Model paths/names (Authorized Training Artifacts)
retriever_model: outputs/retriever
reranker_model: outputs/reranker
triage_model: outputs/triage
generator_model: google/flan-t5-small
generator_lora_path: outputs/generator_lora
preference_dpo_path: outputs/preference_dpo
generator_fallback_model_name: google/flan-t5-small

# Generation controls
generator_max_new_tokens: 120
generator_num_beams: 4
generator_temperature: 0.0
generator_tokenizer_max_length: 768

# Evaluation settings
retrieval_eval_top_k: 5
mrr_k: 10
ndcg_k: 10
tbp_mu_values: [0.10, 0.15, 0.20]

# Safety & Intent Guardrails (Configurable Heuristics)
safety_gate:
  ood_patterns: [
    "\\b(recipe|cook|bake|chef|food|meal|dish|restaurant)\\b",
    "\\b(ipl|cricket|football|soccer|nba|nfl|sports|match|score|game)\\b",
    "\\b(netflix|amazon|ebay|paypal|youtube|instagram|facebook|twitter)\\b",
    "\\b(movie|film|series|show|streaming)\\b",
    "\\b(joke|meme|riddle|funny|humor)\\b",
    "\\b(code|programming|python|java|algorithm|software)\\b",
    "\\b(bitcoin|crypto|ethereum|stock|forex|trading)\\b",
    "\\b(weather|forecast|temperature|rain|sun)\\b",
    "\\b(paris|france|london|capital|geography)\\b",
    "\\b(black hole|quantum|physics|astronomy|space)\\b"
  ]
  vague_patterns: [
    "^\\s*(why am i here|what is this|help me|what should i do|tell me something|explain this|who are you|are you real|what do you do|what can you do|what is your purpose|i don.t know|idk|huh|ok|okay|thanks|thank you|hi+|hey+|hello+|yes|no|sure|maybe|alright|got it|i see)\\s*[.?!]*\\s*$"
  ]

account_action:
  patterns: [
    "\\b(check|view|see|status of|track|where is)\\b.*\\b(my|mine|i have)\\b.*\\b(status|application|case|claim|payment|benefit|account|order|file|form)\\b",
    "\\b(update|change|reset|edit|modify)\\b.*\\b(my|mine)\\b.*\\b(info|information|address|phone|email|bank|direct deposit|account)\\b",
    "\\b(submit|send|file|upload)\\b.*\\b(my|the)\\b.*\\b(form|document|file|application)\\b.*\\b(for me|on my behalf)\\b",
    "\\b(guarantee|promise|assure)\\b.*\\b(approval|acceptance|eligibility|success)\\b",
    "\\b(my|exact|specific)\\b.*\\b(amount|payment|benefit|check|balance)\\b",
    "\\b(why|reason)\\b.*\\b(my|mine|i haven't)\\b.*\\b(delayed|late|not received|not arrived|missing)\\b",
    "\\b(decide|decision|judge|approve)\\b.*\\b(my|this)\\b.*\\b(case|claim|application|request)\\b",
    "\\b(private|personal|your|my)\\b.*\\b(phone|number|cell|mobile|address|email)\\b"
  ]

semantic_intent_filters:
  conflicting_pairs:
    - ["driver license", "non-driver", 0.75]
    - ["license", "id card", 0.50]

# Quality Rubric Weights
weight_supported: 0.2
weight_length: 0.1
weight_fragment: 0.1
weight_grammar: 0.1
weight_repetition: 0.1
weight_direct: 0.2
weight_domain: 0.2

# Quality Thresholds
max_answer_length: 150
repetition_min_length: 20