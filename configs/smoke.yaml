mode: smoke
seed: 42
device: auto

# Sample limits
max_train_samples: 300
max_eval_samples: 20
max_kb_chunks: null

# Training epochs
retriever_epochs: 1
reranker_epochs: 1
triage_epochs: 1
preference_epochs: 1
generator_epochs: 1

# Batch sizes
batch_size: 8
reranker_batch_size: 4
triage_batch_size: 8
gradient_accumulation_steps: 2

# Precision
fp16: true

# Paths
output_dir: outputs
data_dir: data/processed
index_dir: data/indexes
raw_index_dir: data/indexes_raw
domain_indexes_dir: data/indexes_by_domain
eval_file: balanced_eval.jsonl
reports_dir: outputs/reports

# Retrieval
top_k_retrieval: 10
top_k_rerank: 3
top_k_domains: 2
global_domain_filter_multiplier: 10

# Triage loss
mu_boundary: 0.15
lambda_boundary: 0.6

# Routing/Triage Thresholds
tau_domain: 0.35
tau_chunk: 0.50
tau_hard_reject: 0.08
tau_soft_domain: 0.20
cluster_out_of_domain_threshold: 0.35
cluster_confident_margin: 0.10
cluster_ambiguous_top_k: 2
max_clusters_for_confident_query: 1
max_clusters_for_ambiguous_query: 2

# Evidence Logic
evidence_answer_threshold: 0.55
evidence_ticket_threshold: 0.25
high_confidence_evidence_threshold: 0.80
strong_answer_score_threshold: 0.55
borderline_answer_score_threshold: 0.45
min_citation_overlap: 2
wrong_domain_penalty: 0.40
domain_intent_bonus: 0.25
selected_domain_bonus: 0.05
action_match_bonus: 0.20
driver_non_driver_penalty: 0.75
license_id_card_penalty: 0.50

# Triage Decision Thresholds
triage_authoritative_threshold: 0.55
personal_action_ticket_confidence: 0.80
insufficient_evidence_ticket_confidence: 0.70

# Model paths/names (Authorized Training Artifacts)
retriever_model: outputs/retriever
reranker_model: outputs/reranker
triage_model: outputs/triage
generator_model: google/flan-t5-base
generator_lora_path: outputs/generator_lora
preference_dpo_path: outputs/preference_dpo
generator_fallback_model_name: google/flan-t5-small

# Generation controls
generator_max_new_tokens: 120
generator_num_beams: 4
generator_temperature: 0.0
generator_tokenizer_max_length: 768

# Evaluation settings
retrieval_eval_top_k: 5
mrr_k: 10
ndcg_k: 10
tbp_mu_values: [0.10, 0.15, 0.20]

# Quality Rubric Weights
weight_supported: 0.2
weight_length: 0.1
weight_fragment: 0.1
weight_grammar: 0.1
weight_repetition: 0.1
weight_direct: 0.2
weight_domain: 0.2

# Quality Thresholds
max_answer_length: 150
repetition_min_length: 20