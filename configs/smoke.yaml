mode: smoke
seed: 42
device: auto

# Sample limits
max_train_samples: 300
max_eval_samples: 20
max_kb_chunks: null

# Training epochs
retriever_epochs: 1
reranker_epochs: 1
triage_epochs: 1
preference_epochs: 1
generator_epochs: 1

# Batch sizes
batch_size: 8
reranker_batch_size: 4
triage_batch_size: 8
gradient_accumulation_steps: 2

# Precision
fp16: true

# Retrieval
top_k_retrieval: 10
top_k_rerank: 3
top_k_domains: 2

# Triage loss
mu_boundary: 0.15
lambda_boundary: 0.6

# Domain routing thresholds
tau_domain: 0.30
tau_chunk: 0.40

# Cluster-gated retrieval thresholds
cluster_out_of_domain_threshold: 0.30
cluster_confident_margin: 0.10
cluster_ambiguous_top_k: 2
evidence_answer_threshold: 0.40
evidence_ticket_threshold: 0.10
max_clusters_for_confident_query: 1
max_clusters_for_ambiguous_query: 2

# Model paths (use HF hub IDs)
retriever_model: sentence-transformers/all-MiniLM-L6-v2
reranker_model: cross-encoder/ms-marco-MiniLM-L-6-v2
triage_model: distilbert-base-uncased
generator_model: google/flan-t5-large

# Output directories
output_dir: outputs
data_dir: data/processed
index_dir: data/indexes
